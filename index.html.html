<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        // Konfigurasi Tailwind untuk Dark Mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-4 md:p-8 transition-colors duration-300">

    <div class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 transition-colors duration-300">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Keuangan Keluarga</h1>
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-yellow-400">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <div class="flex space-x-2 mb-6 bg-gray-100 dark:bg-gray-700 p-1 rounded-lg">
            <button onclick="switchTab('transaksi')" id="btn-transaksi" class="flex-1 py-2 text-sm font-semibold rounded-md bg-white dark:bg-gray-600 shadow-sm text-blue-600 dark:text-blue-300">Transaksi</button>
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="flex-1 py-2 text-sm font-semibold rounded-md text-gray-600 dark:text-gray-300">Dashboard</button>
        </div>

        <div id="tab-transaksi" class="tab-content active">
            <div class="grid grid-cols-1 gap-4 mb-6">
                <div class="bg-blue-600 dark:bg-blue-800 p-4 rounded-xl text-white text-center">
                    <p class="text-sm opacity-80">Saldo Total</p>
                    <h2 id="total-balance" class="text-3xl font-bold">Rp 0</h2>
                </div>
            </div>

            <form id="finance-form" class="space-y-4 mb-8">
                <input type="text" id="desc" placeholder="Keterangan" required class="w-full p-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="amount" placeholder="Jumlah (Rp)" required class="w-full p-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <select id="type" class="w-full p-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="income">Pemasukan</option>
                    <option value="expense">Pengeluaran</option>
                </select>
                <select id="category" class="w-full p-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Makanan">Makanan</option>
                    <option value="Transportasi">Transportasi</option>
                    <option value="Pribadi">Pribadi</option>
                    <option value="Tagihan">Tagihan</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
                <select id="user" class="w-full p-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Suami">Suami</option>
                    <option value="Istri">Istri</option>
                </select>
                <input type="date" id="date" required class="w-full p-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition">Simpan</button>
            </form>

            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-gray-700 dark:text-gray-300">Riwayat</h3>
                <select id="filter-month" onchange="updateUI()" class="text-sm border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg p-1 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">Semua Bulan</option>
                </select>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <div id="tab-dashboard" class="tab-content">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-gray-700 dark:text-gray-300">Analisis</h3>
                <select id="dashboard-filter-month" onchange="updateCharts()" class="text-sm border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-lg p-1 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">Semua Bulan</option>
                </select>
            </div>
            <div class="space-y-8">
                <div>
                    <h3 class="font-medium text-sm text-gray-600 dark:text-gray-400 mb-2">Pengeluaran Kategori (Suami vs Istri)</h3>
                    <canvas id="chart-categories"></canvas>
                </div>
                <div>
                    <h3 class="font-medium text-sm text-gray-600 dark:text-gray-400 mb-2">Pemasukan vs Pengeluaran</h3>
                    <canvas id="chart-monthly"></canvas>
                </div>
            </div>
        </div>
        
        <button onclick="clearData()" class="w-full mt-8 text-sm text-gray-400 dark:text-gray-500 hover:text-red-500 transition">Hapus Semua Data</button>
    </div>

    <script>
        // Inisialisasi Dark Mode sebagai default
        document.documentElement.classList.add('dark');
        
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
            updateCharts(); // Update chart colors on theme switch
        }

        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let categoryChart, monthlyChart;

        const form = document.getElementById('finance-form');
        const list = document.getElementById('history-list');
        const typeInput = document.getElementById('type');
        const catInput = document.getElementById('category');
        const dateInput = document.getElementById('date');

        dateInput.valueAsDate = new Date();

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('btn-transaksi').classList.toggle('bg-white', tab === 'transaksi');
            document.getElementById('btn-dashboard').classList.toggle('bg-white', tab === 'dashboard');

            if (tab === 'dashboard') {
                updateDashboardFilters();
                updateCharts();
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const transaction = {
                id: Date.now(),
                desc: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: typeInput.value,
                category: typeInput.value === 'expense' ? catInput.value : '',
                user: document.getElementById('user').value,
                date: dateInput.value
            };
            transactions.push(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            form.reset();
            dateInput.valueAsDate = new Date();
            updateUI();
        });

        function updateUI() {
            const filterSelect = document.getElementById('filter-month');
            const currentFilter = filterSelect.value;
            const uniqueMonths = [...new Set(transactions.map(t => t.date.substring(0, 7)))].sort().reverse();
            
            filterSelect.innerHTML = '<option value="all">Semua Bulan</option>';
            uniqueMonths.forEach(month => filterSelect.innerHTML += `<option value="${month}">${month}</option>`);
            filterSelect.value = currentFilter;

            let totalIncome = 0, totalExpense = 0;
            transactions.forEach(t => {
                if (t.type === 'income') totalIncome += t.amount; 
                else totalExpense += t.amount;
            });
            document.getElementById('total-balance').innerText = `Rp ${(totalIncome - totalExpense).toLocaleString()}`;

            const filteredTransactions = currentFilter === 'all' 
                ? transactions 
                : transactions.filter(t => t.date.startsWith(currentFilter));

            list.innerHTML = '';
            filteredTransactions.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700 rounded-lg border-l-4 ' + (t.type === 'income' ? 'border-green-500' : 'border-red-500');
                item.innerHTML = `
                    <div><p class="font-medium text-gray-800 dark:text-gray-200">${t.desc}</p><p class="text-xs text-gray-500 dark:text-gray-400">${t.date} • ${t.user}</p></div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">${t.type === 'income' ? '+' : '-'} Rp ${t.amount.toLocaleString()}</span>
                        <button onclick="deleteItem(${t.id})" class="text-gray-400 hover:text-red-500">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function updateDashboardFilters() {
            const dbFilter = document.getElementById('dashboard-filter-month');
            const uniqueMonths = [...new Set(transactions.map(t => t.date.substring(0, 7)))].sort().reverse();
            const currentVal = dbFilter.value;
            dbFilter.innerHTML = '<option value="all">Semua Bulan</option>';
            uniqueMonths.forEach(m => dbFilter.innerHTML += `<option value="${m}">${m}</option>`);
            if (uniqueMonths.includes(currentVal)) dbFilter.value = currentVal;
        }

        function updateCharts() {
            const ctxCat = document.getElementById('chart-categories').getContext('2d');
            const ctxMonthly = document.getElementById('chart-monthly').getContext('2d');
            const filterMonth = document.getElementById('dashboard-filter-month').value;
            const isDark = document.documentElement.classList.contains('dark');

            const filteredForCat = filterMonth === 'all' 
                ? transactions.filter(t => t.type === 'expense')
                : transactions.filter(t => t.type === 'expense' && t.date.startsWith(filterMonth));

            const categories = [...new Set(filteredForCat.map(t => t.category))];
            const dataSuami = categories.map(cat => filteredForCat.filter(t => t.category === cat && t.user === 'Suami').reduce((sum, t) => sum + t.amount, 0));
            const dataIstri = categories.map(cat => filteredForCat.filter(t => t.category === cat && t.user === 'Istri').reduce((sum, t) => sum + t.amount, 0));

            const monthlyData = transactions.reduce((acc, t) => {
                const month = t.date.substring(0, 7);
                if (!acc[month]) acc[month] = { income: 0, expense: 0 };
                acc[month][t.type] += t.amount;
                return acc;
            }, {});

            if (categoryChart) categoryChart.destroy();
            if (monthlyChart) monthlyChart.destroy();

            const chartOptions = {
                scales: { 
                    y: { beginAtZero: true, ticks: { color: isDark ? '#fff' : '#000' } },
                    x: { ticks: { color: isDark ? '#fff' : '#000' } }
                },
                plugins: { legend: { labels: { color: isDark ? '#fff' : '#000' } } }
            };

            categoryChart = new Chart(ctxCat, {
                type: 'bar',
                data: { 
                    labels: categories, 
                    datasets: [
                        { label: 'Suami', data: dataSuami, backgroundColor: '#3b82f6' },
                        { label: 'Istri', data: dataIstri, backgroundColor: '#ec4899' }
                    ] 
                },
                options: chartOptions
            });

            monthlyChart = new Chart(ctxMonthly, {
                type: 'bar',
                data: { 
                    labels: Object.keys(monthlyData), 
                    datasets: [
                        { label: 'Pemasukan', data: Object.values(monthlyData).map(d => d.income), backgroundColor: '#10b981' },
                        { label: 'Pengeluaran', data: Object.values(monthlyData).map(d => d.expense), backgroundColor: '#ef4444' }
                    ] 
                },
                options: chartOptions
            });
        }

        function deleteItem(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateUI();
            if (document.getElementById('tab-dashboard').classList.contains('active')) updateCharts();
        }

        function clearData() {
            transactions = [];
            localStorage.clear();
            updateUI();
            switchTab('transaksi');
        }

        updateUI();
    </script>
</body>
</html>
