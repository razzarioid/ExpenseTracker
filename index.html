<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-4 transition-colors">

    <div class="max-w-md mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 relative">
        <!-- Loading Spinner Overlay -->
        <div id="loading-overlay" class="absolute inset-0 bg-white/80 dark:bg-gray-800/80 rounded-2xl flex flex-col justify-center items-center z-50 hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-600 mb-2"></div>
            <p class="text-sm text-gray-600 dark:text-gray-300 font-medium">Memproses data...</p>
        </div>

        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Finance Tracker</h1>
            <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:opacity-90">
                🌙
            </button>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
            <button class="tab-btn flex-1 py-2 text-center font-medium border-b-2 border-blue-600 text-blue-600 active" onclick="switchTab('input-tab', this)">
                Transaksi
            </button>
            <button class="tab-btn flex-1 py-2 text-center font-medium border-b-2 border-transparent text-gray-500 dark:text-gray-400" onclick="switchTab('history-tab', this)">
                Riwayat
            </button>
            <button class="tab-btn flex-1 py-2 text-center font-medium border-b-2 border-transparent text-gray-500 dark:text-gray-400" onclick="switchTab('chart-tab', this)">
                Analisis
            </button>
        </div>

        <!-- TAB 1: INPUT TRANSAKSI -->
        <div id="input-tab" class="tab-content active space-y-4">
            <form id="transaction-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipe Transaksi</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" id="btn-expense" class="py-2.5 rounded-xl border-2 border-red-500 bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400 font-semibold" onclick="setTxType('expense')">
                            Pengeluaran
                        </button>
                        <button type="button" id="btn-income" class="py-2.5 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-semibold" onclick="setTxType('income')">
                            Pemasukan
                        </button>
                    </div>
                </div>

                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Jumlah (Rp)</label>
                    <input type="number" id="amount" required placeholder="Contoh: 50000" class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Keterangan</label>
                    <input type="text" id="description" required placeholder="Contoh: Belanja Bulanan" class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div id="category-container">
                    <label for="category" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Kategori</label>
                    <select id="category" class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="Makanan">Makanan</option>
                        <option value="Transportasi">Transportasi</option>
                        <option value="Tagihan">Tagihan</option>
                        <option value="Hiburan">Hiburan</option>
                        <option value="Kesehatan">Kesehatan</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div>
                    <label for="user" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">User / Pembuat</label>
                    <select id="user" class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="Suami">Suami</option>
                        <option value="Istri">Istri</option>
                    </select>
                </div>

                <div>
                    <label for="date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tanggal Transaksi</label>
                    <input type="date" id="date" required class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-all">
                    Simpan Transaksi
                </button>
            </form>
        </div>

        <!-- TAB 2: RIWAYAT TRANSAKSI -->
        <div id="history-tab" class="tab-content space-y-4">
            <!-- Filter Sederhana -->
            <div class="flex gap-2">
                <select id="filter-user" onchange="applyFilters()" class="flex-1 p-2 text-xs rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white">
                    <option value="Semua">Semua User</option>
                    <option value="Suami">Suami</option>
                    <option value="Istri">Istri</option>
                </select>
                <select id="filter-type" onchange="applyFilters()" class="flex-1 p-2 text-xs rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white">
                    <option value="Semua">Semua Tipe</option>
                    <option value="expense">Pengeluaran</option>
                    <option value="income">Pemasukan</option>
                </select>
            </div>

            <!-- List Riwayat -->
            <div id="transaction-list" class="space-y-2 max-h-[450px] overflow-y-auto pr-1">
                <p class="text-center text-sm text-gray-500 py-4">Memuat riwayat transaksi...</p>
            </div>
        </div>

        <!-- TAB 3: ANALISIS / CHART -->
        <div id="chart-tab" class="tab-content space-y-6">
            <div class="bg-gray-50 dark:bg-gray-900 p-4 rounded-xl">
                <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 text-center">Perbandingan Bulanan</h3>
                <div class="h-64">
                    <canvas id="chart-monthly"></canvas>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-emerald-50 dark:bg-emerald-950/20 p-3 rounded-xl border border-emerald-100 dark:border-emerald-900/30">
                    <span class="text-xs text-emerald-600 dark:text-emerald-400 block mb-1 font-medium">Total Pemasukan</span>
                    <span id="summary-income" class="text-base font-bold text-emerald-700 dark:text-emerald-300">Rp 0</span>
                </div>
                <div class="bg-red-50 dark:bg-red-950/20 p-3 rounded-xl border border-red-100 dark:border-red-900/30">
                    <span class="text-xs text-red-600 dark:text-red-400 block mb-1 font-medium">Total Pengeluaran</span>
                    <span id="summary-expense" class="text-base font-bold text-red-700 dark:text-red-300">Rp 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI WEB APP URL GOOGLE SCRIPT ---
        // Masukkan URL Web App Script Anda di sini agar sinkron ke Google Sheet Anda!
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyP5AI06D3pv2ozhg9ZqUJ93jzMhtlKBn4sTB-3wWCHAr1sl6hde3bCR-y5vdkhkI7bqQ/exec"; 

        let allTransactions = [];
        let currentTxType = 'expense';
        let monChart = null;

        // Dark Mode Toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                themeToggle.innerHTML = '☀️';
            } else {
                themeToggle.innerHTML = '🌙';
            }
            if (allTransactions.length > 0) {
                renderChart(allTransactions);
            }
        });

        // Tab Switcher
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-blue-600', 'border-blue-600');
                b.classList.add('text-gray-500', 'dark:text-gray-400', 'border-transparent');
            });

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('text-blue-600', 'border-blue-600');
            btn.classList.remove('text-gray-500', 'dark:text-gray-400', 'border-transparent');
        }

        // Set tipe transaksi (Pemasukan / Pengeluaran)
        function setTxType(type) {
            currentTxType = type;
            const btnExpense = document.getElementById('btn-expense');
            const btnIncome = document.getElementById('btn-income');

            if (type === 'expense') {
                btnExpense.className = "py-2.5 rounded-xl border-2 border-red-500 bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400 font-semibold";
                btnIncome.className = "py-2.5 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-semibold";
            } else {
                btnIncome.className = "py-2.5 rounded-xl border-2 border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400 font-semibold";
                btnExpense.className = "py-2.5 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-semibold";
            }
            toggleCategoryField();
        }

        function toggleCategoryField() {
            const container = document.getElementById('category-container');
            if (currentTxType === 'income') {
                container.style.opacity = '0.4';
                document.getElementById('category').disabled = true;
                document.getElementById('category').value = 'Makanan'; // Default / Non-active
            } else {
                container.style.opacity = '1';
                document.getElementById('category').disabled = false;
            }
        }

        // Format Angka ke Rupiah
        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number);
        }

        // Format tanggal dari YYYY-MM-DD menjadi format teks Indonesia (misal: 01 Juli 2026)
        function formatTanggalLokal(dateString) {
            if (!dateString) return "-";
            
            // Atasi masalah jika format tanggal adalah string ISO atau YYYY-MM-DD
            // Kita potong bagian jam jika ada agar murni mendapatkan tanggalnya saja
            const pureDateStr = dateString.split(' ')[0] || dateString;
            const parts = pureDateStr.split('-');
            
            if (parts.length === 3) {
                const year = parts[0];
                const monthIndex = parseInt(parts[1], 10) - 1;
                const day = parseInt(parts[2], 10);
                
                const bulanIndo = [
                    "Januari", "Februari", "Maret", "April", "Mei", "Juni",
                    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
                ];
                
                return `${day} ${bulanIndo[monthIndex]} ${year}`;
            }
            
            // Fallback jika format sudah dalam bentuk lokal DD/MM/YYYY dari server
            return dateString;
        }

        // Fetch Data dari Database
        function fetchData() {
            if (WEB_APP_URL.includes("SAMPLE_ID")) {
                // Simulasi Data Dummy jika URL belum di-setup oleh user
                console.log("Menggunakan simulasi data dummy.");
                allTransactions = [
                    { Timestamp: "7/2/2026 3:11:06", ID: "1", Keterangan: "Jatah Bulanan", Jumlah: 5000000, Tipe: "income", Kategori: "Makanan", User: "Suami", Tanggal: "2026-07-01" },
                    { Timestamp: "7/2/2026 3:12:43", ID: "2", Keterangan: "Pertamax", Jumlah: 300000, Tipe: "expense", Kategori: "Transportasi", User: "Suami", Tanggal: "2026-07-02" },
                    { Timestamp: "7/2/2026 20:01:39", ID: "3", Keterangan: "Ngopi dibandara", Jumlah: 36400, Tipe: "expense", Kategori: "Makanan", User: "Suami", Tanggal: "2026-07-02" },
                    { Timestamp: "7/6/2026 13:16:07", ID: "4", Keterangan: "CC BCA", Jumlah: 1346370, Tipe: "expense", Kategori: "Tagihan", User: "Istri", Tanggal: "2026-06-26" }
                ];
                updateUI(allTransactions);
                return;
            }

            document.getElementById('loading-overlay').classList.remove('hidden');
            fetch(`${WEB_APP_URL}?action=read`)
                .then(res => res.json())
                .then(data => {
                    allTransactions = data;
                    updateUI(allTransactions);
                })
                .catch(err => {
                    console.error("Gagal memuat data:", err);
                    // Gunakan data fallback / offline jika gagal koneksi
                    allTransactions = [];
                    document.getElementById('transaction-list').innerHTML = `
                        <div class="text-center py-4">
                            <p class="text-xs text-red-500 font-semibold mb-2">Gagal menyambung ke server.</p>
                            <button onclick="fetchData()" class="px-3 py-1 text-xs bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">Coba Lagi</button>
                        </div>
                    `;
                })
                .finally(() => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                });
        }

        // Tampilkan data ke UI
        function updateUI(data) {
            renderTransactionsList(data);
            renderChart(data);
            calculateSummary(data);
        }

        // Render List Riwayat Transaksi (Perbaikan Utama di Sini)
        function renderTransactionsList(data) {
            const listContainer = document.getElementById('transaction-list');
            listContainer.innerHTML = '';

            if (data.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-sm text-gray-500 py-6">Tidak ada transaksi ditemukan.</p>`;
                return;
            }

            // Urutkan transaksi berdasarkan ID atau tanggal input terbaru
            const sortedData = [...data].sort((a, b) => {
                const dateA = new Date(a.Tanggal || a.tanggal || 0);
                const dateB = new Date(b.Tanggal || b.tanggal || 0);
                return dateB - dateA; // Terkini di atas
            });

            sortedData.forEach(item => {
                // --- SOLUSI BUG ---
                // Kita gunakan properti "Tanggal" atau "tanggal" dari form user, bukan properti "Timestamp" otomatis
                const rawDate = item.Tanggal || item.tanggal; 
                const displayDate = formatTanggalLokal(rawDate); // Hanya tanggal tanpa timestamp jam

                const isExpense = (item.Tipe || item.tipe || '').toLowerCase() === 'expense';
                const amountText = (isExpense ? '-' : '+') + formatRupiah(item.Jumlah || item.jumlah || 0);
                const colorClass = isExpense ? 'text-red-600 dark:text-red-400' : 'text-emerald-600 dark:text-emerald-400';
                const bgIndicator = isExpense ? 'bg-red-500' : 'bg-emerald-500';

                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-3.5 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-100 dark:border-gray-800 transition-all hover:scale-[1.01]";
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-10 rounded-full ${bgIndicator}"></div>
                        <div>
                            <p class="text-sm font-semibold text-gray-800 dark:text-gray-200">${item.Keterangan || item.keterangan || '-'}</p>
                            <p class="text-[11px] text-gray-500 dark:text-gray-400 mt-0.5">
                                <span class="bg-gray-200 dark:bg-gray-800 px-1.5 py-0.5 rounded font-medium">${item.User || item.user || 'Suami'}</span>
                                <span class="mx-1">•</span> 
                                <span>${displayDate}</span>
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold ${colorClass}">${amountText}</p>
                        <p class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5 font-medium">${item.Kategori || item.kategori || '-'}</p>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // Filter data di UI
        function applyFilters() {
            const userFilter = document.getElementById('filter-user').value;
            const typeFilter = document.getElementById('filter-type').value;

            let filtered = allTransactions;

            if (userFilter !== 'Semua') {
                filtered = filtered.filter(t => (t.User || t.user) === userFilter);
            }

            if (typeFilter !== 'Semua') {
                filtered = filtered.filter(t => (t.Tipe || t.tipe || '').toLowerCase() === typeFilter);
            }

            renderTransactionsList(filtered);
        }

        // Hitung Summary Box
        function calculateSummary(data) {
            let totalIncome = 0;
            let totalExpense = 0;

            data.forEach(item => {
                const isExpense = (item.Tipe || item.tipe || '').toLowerCase() === 'expense';
                const amount = parseFloat(item.Jumlah || item.jumlah || 0);
                if (isExpense) {
                    totalExpense += amount;
                } else {
                    totalIncome += amount;
                }
            });

            document.getElementById('summary-income').innerText = formatRupiah(totalIncome);
            document.getElementById('summary-expense').innerText = formatRupiah(totalExpense);
        }

        // Kirim Form Transaksi Baru
        function handleFormSubmit(event) {
            event.preventDefault();

            const description = document.getElementById('description').value;
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const user = document.getElementById('user').value;
            const date = document.getElementById('date').value; // Tanggal pilihan manual user

            if (!date) {
                alert("Harap masukkan tanggal transaksi!");
                return;
            }

            const payload = {
                action: 'create',
                Keterangan: description,
                Jumlah: amount,
                Tipe: currentTxType,
                Kategori: currentTxType === 'income' ? 'Makanan' : category, // Default kategori untuk pemasukan
                User: user,
                Tanggal: date // Dikirim terpisah dari waktu submit (Timestamp)
            };

            if (WEB_APP_URL.includes("SAMPLE_ID")) {
                // Mode Dummy offline jika URL belum diubah
                const mockNewTx = {
                    Timestamp: new Date().toLocaleString(),
                    ID: Date.now().toString(),
                    ...payload
                };
                allTransactions.unshift(mockNewTx);
                updateUI(allTransactions);
                document.getElementById('transaction-form').reset();
                document.getElementById('date').valueAsDate = new Date();
                switchTab('history-tab', document.querySelectorAll('.tab-btn')[1]);
                return;
            }

            document.getElementById('loading-overlay').classList.remove('hidden');

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Menghindari CORS error pada Google Apps Script redirect
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // Karena 'no-cors' tidak mengembalikan respons yang valid di Fetch API,
                // kita langsung panggil ulang data ter-update secara otomatis
                setTimeout(() => {
                    fetchData();
                    document.getElementById('transaction-form').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    switchTab('history-tab', document.querySelectorAll('.tab-btn')[1]);
                }, 1000);
            })
            .catch(err => {
                console.error("Gagal mengirim transaksi:", err);
            })
            .finally(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            });
        }

        // Render Grafik Bulanan
        function renderChart(data) {
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#f3f4f6' : '#1f2937';
            const gridColor = isDark ? '#374151' : '#e5e7eb';

            // Agregasi bulanan sederhana
            const monthlyData = {};
            data.forEach(item => {
                const rawDate = item.Tanggal || item.tanggal || '';
                if (!rawDate) return;
                const month = rawDate.substring(0, 7); // Format: YYYY-MM
                if (!monthlyData[month]) {
                    monthlyData[month] = { income: 0, expense: 0 };
                }

                const isExpense = (item.Tipe || item.tipe || '').toLowerCase() === 'expense';
                const val = parseFloat(item.Jumlah || item.jumlah || 0);
                if (isExpense) {
                    monthlyData[month].expense += val;
                } else {
                    monthlyData[month].income += val;
                }
            });

            const sortedMonths = Object.keys(monthlyData).sort();
            const incomes = sortedMonths.map(m => monthlyData[m].income);
            const expenses = sortedMonths.map(m => monthlyData[m].expense);
            const monthlyLabels = sortedMonths.map(m => {
                const parts = m.split('-');
                const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                return `${monthNames[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
            });

            if (monChart) {
                monChart.destroy();
            }

            const ctxMon = document.getElementById('chart-monthly').getContext('2d');
            monChart = new Chart(ctxMon, {
                type: 'bar',
                data: {
                    labels: monthlyLabels,
                    datasets: [
                        {
                            label: 'Pemasukan',
                            data: incomes,
                            backgroundColor: '#10b981', // Hijau
                            borderRadius: 4
                        },
                        {
                            label: 'Pengeluaran',
                            data: expenses,
                            backgroundColor: '#ef4444', // Merah
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: textColor } }
                    },
                    scales: {
                        x: { ticks: { color: textColor }, grid: { color: gridColor } },
                        y: { beginAtZero: true, ticks: { color: textColor }, grid: { color: gridColor } }
                    }
                }
            });
        }

        // Inisialisasi awal
        toggleCategoryField();
        document.getElementById('date').valueAsDate = new Date();
        fetchData();
    </script>
</body>
</html>
